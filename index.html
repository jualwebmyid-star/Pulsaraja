<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulsa Raja V11.9</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0a0b;--card:#111214;--border:#222326;--text:#e8e8e8;--muted:#8b8f98;--brand:#f59e0b;--ok:#10b981;--bad:#ef4444}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif}
.wrap{max-width:480px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.input,button{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0f1012;color:var(--text);font-size:15px}
.btn{font-weight:700;cursor:pointer;transition:.2s}.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--brand),#fb923c);border:none;color:#1a1a1a}
.btn-ghost{background:transparent}
.hidden{display:none}
.row{display:flex;gap:8px}
h2{margin:0 0 12px;font-size:20px}
.muted{color:var(--muted);font-size:13px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1f2937;padding:10px 14px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:99}
.toast.show{opacity:1}

/* BOTTOM NAV */
.page{display:none;padding-bottom:80px} 
.page.active{display:block}
.bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-around;align-items:center;
background:rgba(12,12,12,.9);backdrop-filter:blur(10px);border-top:1px solid var(--border);height:64px;padding-bottom:env(safe-area-bottom)}
.navBtn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--muted);transition:.2s;flex:1;background:transparent;border:none;color:var(--muted)}
.navBtn svg{width:24px;height:24px}
.navBtn.active{color:var(--brand)}
</style>
</head>
<body>
<div class="wrap">

  <!-- AUTH -->
  <div id="authBox" class="card">
    <h2>Login / Daftar</h2>
    <input id="email" class="input" placeholder="Email" type="email"/>
    <input id="pass" class="input" placeholder="Password" type="password" style="margin-top:8px"/>
    <div class="row" style="margin-top:12px">
      <button class="btn btn-primary" onclick="daftar()">Daftar</button>
      <button class="btn btn-ghost" onclick="login()">Login</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appBox" class="hidden">
    
    <!-- PAGE 1: DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <h2>Dashboard</h2>
      <div class="card">
        <div class="muted">Saldo Anda</div>
        <div style="font-size:28px;font-weight:800">Rp<span id="saldoDash">0</span></div>
      </div>
      <div class="card">
        <div class="muted">WD</div>
        <input id="wdNominal" class="input" type="number" placeholder="Min 10000"/>
        <input id="wdRek" class="input" placeholder="DANA/OVO/Rek" style="margin-top:8px"/>
        <button class="btn btn-primary" style="margin-top:8px" onclick="ajukanWD()">Ajukan WD</button>
      </div>
    </div>

    <!-- PAGE 2: MISI -->
    <div id="page-misi" class="page">
      <h2>Misi Harian</h2>
      <div class="card">Kerjain misi buat nambah koin 💰 <br><span class="muted">Fitur misi bisa lu isi sendiri nanti</span></div>
    </div>

    <!-- PAGE 3: AKUN -->
    <div id="page-akun" class="page">
      <h2>Akun Saya</h2>
      <div class="card">
        <div class="muted">Email</div>
        <div id="emailAkun">-</div>
        <div class="muted" style="margin-top:8px">Username</div>
        <div id="namaAkun">-</div>
      </div>
      <button id="adminBtn" class="btn btn-primary hidden" onclick="openAdmin()">ADMIN PANEL</button>
      <button class="btn btn-ghost" style="margin-top:8px;border-color:var(--bad);color:var(--bad)" onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- ADMIN -->
  <div id="adminBox" class="hidden wrap">
    <h2>Admin Panel</h2>
    <button class="btn btn-ghost" onclick="backToApp()">← Kembali</button>
    <div id="wdList" class="card">Loading...</div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottomNav">
  <button class="navBtn active" onclick="showPage('page-dashboard')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Dashboard
  </button>
  <button class="navBtn" onclick="showPage('page-misi')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Misi
  </button>
  <button class="navBtn" onclick="showPage('page-akun')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Akun
  </button>
</nav>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let userId=null;

const toast=(m)=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)};

// NAV
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.navBtn[onclick="showPage('${id}')"]`).classList.add('active');
}

// AUTH
async function daftar(){
  const email=document.getElementById('email').value,pass=document.getElementById('pass').value;
  const {data,error}=await supabaseClient.auth.signUp({email,password:pass});
  if(error)return toast(error.message);
  await supabaseClient.from('profiles').insert({id:data.user.id,email});
  toast('Daftar berhasil. Login ya');
}
async function login(){
  const email=document.getElementById('email').value,pass=document.getElementById('pass').value;
  const {error}=await supabaseClient.auth.signInWithPassword({email,password:pass});
  if(error)return toast(error.message);
}
async function logout(){await supabaseClient.auth.signOut()}

// APP LOGIC
supabaseClient.auth.onAuthStateChange(async (event,session)=>{
  if(session&&event==='SIGNED_IN'){
    userId=session.user.id;
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    document.getElementById('adminBox').classList.add('hidden');
    
    const {data:profile}=await supabaseClient.from('profiles').select('is_admin').eq('id',session.user.id).single();
    if(profile?.is_admin)document.getElementById('adminBtn').classList.remove('hidden');
    
    loadProfile();
  }else if(event==='SIGNED_OUT'){
    userId=null;showPage('page-dashboard');
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('appBox').classList.add('hidden');
    document.getElementById('adminBox').classList.add('hidden');
  }
});

async function loadProfile(){
  const {data}=await supabaseClient.from('profiles').select('*').eq('id',userId).single();
  if(data){
    document.getElementById('saldoDash').innerText=(data.saldo||0).toLocaleString('id-ID');
    document.getElementById('emailAkun').innerText=data.email;
    document.getElementById('namaAkun').innerText=data.username||'-';
  }
}

async function ajukanWD(){
  const nominal=+document.getElementById('wdNominal').value;
  const rekening=document.getElementById('wdRek').value;
  if(nominal<10000)return toast('Min WD 10rb');
  if(!rekening)return toast('Isi rekening dulu');
  const {data:p}=await supabaseClient.from('profiles').select('saldo').eq('id',userId).single();
  if(p.saldo<nominal)return toast('Saldo kurang');
  await supabaseClient.from('withdrawals').insert({user_id:userId,nominal,rekening,status:'pending'});
  await supabaseClient.from('profiles').update({saldo:p.saldo-nominal}).eq('id',userId);
  toast('WD diajukan');loadProfile();
}

// ADMIN
function openAdmin(){document.getElementById('appBox').classList.add('hidden');document.getElementById('adminBox').classList.remove('hidden');loadWD();}
function backToApp(){document.getElementById('adminBox').classList.add('hidden');document.getElementById('appBox').classList.remove('hidden');}

async function loadWD(){
  const {data}=await supabaseClient.from('withdrawals').select('*,profiles(email)').eq('status','pending').order('created_at',{ascending:false});
  const box=document.getElementById('wdList');
  if(!data||!data.length)return box.innerHTML='<div class="muted">Kosong</div>';
  box.innerHTML=data.map(w=>`
    <div class="card" style="margin-bottom:8px">
      <div>${w.profiles.email}</div>
      <div class="muted">Rp${w.nominal.toLocaleString('id-ID')} | ${w.rekening}</div>
      <div class="row" style="margin-top:8px">
        <button class="btn btn-primary" onclick="setStatus('${w.id}','approved')">Approve</button>
        <button class="btn btn-ghost" style="border-color:var(--bad)" onclick="setStatus('${w.id}','rejected')">Reject</button>
      </div>
    </div>`).join('');
}
async function setStatus(id,status){
  await supabaseClient.from('withdrawals').update({status}).eq('id',id);
  toast('OK');loadWD();
}
</script>
</body>
</html>
