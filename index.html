<!DOCTYPE html>

    <input id="pass" type="password" placeholder="Password" class="w-full bg-slate-700 p-2 rounded mb-2">
    <button id="loginBtn" class="w-full bg-blue-600 py-2 rounded">Login</button>
    <button id="signupBtn" class="w-full bg-slate-600 py-2 rounded mt-2">Daftar</button>
  </div>

  <div id="appBox" class="hidden">
    <div class="bg-slate-800 p-5 rounded-2xl text-center mb-4">
      <p>Poin: <span id="points" class="text-3xl font-bold">0</span></p>
      <button id="adBtn" class="w-full bg-green-600 py-3 rounded mt-2">Nonton Iklan +100</button>
    </div>
    <button id="logoutBtn" class="w-full bg-red-600 py-2 rounded">Logout</button>
  </div>
