<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulsaRaja Cuan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- GANTI ZONE ID DI SINI -->
  <script src='//libtl.com/sdk.js' data-zone='254068' data-sdk='show_254068'></script> 
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4" } }
  </script>
  <style>.modal-bg { backdrop-filter: blur(4px); } </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans">

  <div class="p-4 max-w-md mx-auto">
    <div id="authBox" class="bg-slate-800 p-6 rounded-2xl shadow-lg mt-10">
      <h1 class="text-3xl font-bold text-yellow-400 text-center mb-4">PulsaRaja 🔥</h1>
      <input id="email" type="email" placeholder="Email" class="w-full bg-slate-700 p-3 rounded-lg mb-2 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <input id="pass" type="password" placeholder="Password min 6" class="w-full bg-slate-700 p-3 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded-lg mb-2 transition">Login</button>
      <button id="signupBtn" class="w-full bg-slate-600 hover:bg-slate-700 font-bold py-3 rounded-lg transition">Daftar Gratis</button>
      <p id="authMsg" class="text-green-400 text-sm text-center mt-2 h-5"></p>
    </div>

    <div id="appBox" class="hidden">
      <div class="bg-slate-800 p-6 rounded-2xl text-center mb-4 shadow-lg">
        <p class="text-slate-400">Poin Kamu</p>
        <p id="points" class="text-5xl font-bold text-yellow-400">0</p>
      </div>

      <div class="bg-slate-800 p-4 rounded-2xl mb-4 shadow-lg">
        <p class="text-sm text-slate-400 mb-1">Link Referral Kamu</p>
        <div class="flex gap-2">
          <input id="myRefCode" readonly class="w-full bg-slate-700 p-2 rounded-lg font-bold text-yellow-400 text-center text-xs">
          <button id="copyBtn" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold px-4 rounded-lg transition">Salin</button>
        </div>
        <p id="copyMsg" class="text-xs text-center mt-1 h-4 text-green-400"></p>
      </div>

      <button id="adBtn" class="w-full bg-green-600 hover:bg-green-700 font-bold py-4 rounded-xl mb-3 shadow-lg transition">Nonton Iklan</button>
      <button id="wdBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-xl mb-3 shadow-lg transition">Withdraw Poin</button>
      
      <div id="premiumBox" class="bg-slate-800 p-4 rounded-2xl mb-3 shadow-lg">
        <p id="premiumStatus" class="font-bold text-center mb-2">Status: FREE</p>
        <button id="upgradeBtn" class="w-full bg-purple-600 hover:bg-purple-700 font-bold py-3 rounded-xl shadow-lg transition">Upgrade PREMIUM Rp10.000 via BCA</button>
      </div>

      <button id="logoutBtn" class="w-full bg-red-600 hover:bg-red-700 font-bold py-2 rounded-lg text-sm transition">Logout</button>
      <p id="appMsg" class="text-center text-sm mt-3 text-yellow-400 h-5"></p>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 modal-bg flex items-center justify-center p-4 z-50">
    <div class="bg-slate-800 w-full max-w-sm rounded-2xl p-6 shadow-2xl">
      <p id="modalTitle" class="font-bold text-lg mb-2 text-yellow-400"></p>
      <p id="modalText" class="text-slate-300 mb-4 whitespace-pre-line"></p>
      <div id="modalInputBox" class="hidden mb-4">
        <input id="modalInput" type="text" placeholder="Paste link imgur.com di sini" class="w-full bg-slate-700 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>
      <div class="flex gap-2">
        <button id="modalCancel" class="w-full bg-slate-600 hover:bg-slate-700 font-bold py-2 rounded-lg transition">Batal</button>
        <button id="modalOk" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded-lg transition">OK</button>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from '@supabase/supabase-js'
  // GANTI URL + KEY
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
  const REK_BCA = '1234567890 a.n NAMA LU'; // GANTI REK BCA LU

  // GANTI INI JADI DOMAIN VERCEL LU YANG BENERAN
  const BASE_URL = 'https://pulsaraja.vercel.app';

  let userId = null;
  const authMsg = document.getElementById('authMsg');
  const appMsg = document.getElementById('appMsg');

  // ===== V6: AUTO AMBIL KODE REF PAKAI REGEX BANDEL =====
  function getRefCode() {
    const url = window.location.href;
    const match = url.match(/[?&]ref=([^&]+)/i); // i = case insensitive
    return match? match[1].trim() : null;
  }
  const refFromUrl = getRefCode(); // Cek 1x pas awal load

  // ===== SISTEM MODAL =====
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const modalInputBox = document.getElementById('modalInputBox');
  const modalInput = document.getElementById('modalInput');
  const modalOk = document.getElementById('modalOk');
  const modalCancel = document.getElementById('modalCancel');
  let modalCallback = null;
  function showModal({title, text, input=false, callback}) {
    modalTitle.innerText = title; modalText.innerText = text;
    modalInputBox.classList.toggle('hidden',!input); modalInput.value = '';
    modal.classList.remove('hidden'); modalCallback = callback;
  }
  function hideModal() { modal.classList.add('hidden'); modalCallback = null; }
  modalOk.onclick = () => { if(modalCallback) modalCallback(modalInput.value); hideModal(); }
  modalCancel.onclick = hideModal;

// ===== AUTH =====
document.getElementById('signupBtn').onclick = async () => {
  authMsg.innerText = 'Daftar...';
  const currentRef = getRefCode();
  console.log('REF KEDETEKSI:', currentRef);

  let referrerId = null;
  if(currentRef && currentRef.length > 3){
    const res = await supabase.from('profiles').select('id').eq('referral_code', currentRef).single();
    if(res.data) {
      referrerId = res.data.id;
      authMsg.innerText = `Daftar pakai kode ref: ${currentRef} ✅`;
    } else {
      authMsg.innerText = `Kode ref ${currentRef} salah`;
    }
  }

  const { error } = await supabase.auth.signUp({
    email: document.getElementById('email').value,
    password: document.getElementById('pass').value,
    options: { data: { referred_by: referrerId } }
  });
  
  if(error) {
    authMsg.innerText = 'ERROR: ' + error.message;
  } else {
    // KUNCI NYA DISINI BOS: KASIH JEDA 2 DETIK
    authMsg.innerText = authMsg.innerText || 'Daftar berhasil! Auto login...';
    await new Promise(r => setTimeout(r, 2000)); // Jeda 2 detik biar kebaca
  }
}

document.getElementById('loginBtn').onclick = async () => {
  authMsg.innerText = 'Login...';
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value, password: document.getElementById('pass').value
  });
  authMsg.innerText = error? 'ERROR: ' + error.message : '';
}

document.getElementById('logoutBtn').onclick = async () => await supabase.auth.signOut();

// GANTI INI BIAR GAK LANGSUNG KE-LEMPEAR PAS SIGNUP
supabase.auth.onAuthStateChange(async (event, session) => {
  if(session && event === 'SIGNED_IN') { // <-- TAMBAHIN CEK EVENT
    userId = session.user.id;
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    loadProfile();
  } else if(event === 'SIGNED_OUT') {
    userId = null;
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('appBox').classList.add('hidden');
  }
});

  async function loadProfile() {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if(data){
      document.getElementById('points').innerText = data.points.toLocaleString('id-ID');
      document.getElementById('myRefCode').value = `${BASE_URL}?ref=${data.referral_code}`;

      const statusEl = document.getElementById('premiumStatus');
      const btnEl = document.getElementById('upgradeBtn');
      if(data.upgrade_status === 'approved'){
        statusEl.innerText = 'Status: PREMIUM 🔥';
        btnEl.classList.add('hidden');
      } else if(data.upgrade_status === 'pending'){
        statusEl.innerText = 'Status: MENUNGGU APPROVAL...';
        btnEl.innerText = 'Tunggu Approval Admin';
        btnEl.disabled = true;
        btnEl.classList.remove('bg-purple-600');
        btnEl.classList.add('bg-slate-500');
      } else {
        statusEl.innerText = 'Status: FREE';
      }
    }
  }

  document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('myRefCode').value);
    document.getElementById('copyMsg').innerText = 'Link berhasil disalin!';
    setTimeout(()=> document.getElementById('copyMsg').innerText='', 2000);
  }

  document.getElementById('adBtn').onclick = async () => {
    appMsg.innerText = 'Cek limit...';
    const today = new Date().toISOString().split('T')[0];
    const { data: p } = await supabase.from('profiles').select('points, upgrade_status, ad_clicks_today, last_ad_date').eq('id', userId).single();

    if(p.last_ad_date!== today){
      await supabase.from('profiles').update({ ad_clicks_today: 0, last_ad_date: today }).eq('id', userId);
      p.ad_clicks_today = 0;
    }

    const maxClicks = p.upgrade_status === 'approved'? 20 : 5;
    if(p.ad_clicks_today >= maxClicks){
      return showModal({title:'Limit Habis', text:`Kamu udah ${maxClicks}x hari ini. Upgrade PREMIUM buat 20x`, callback:()=>{}});
    }
    if(typeof show_1234567890!== 'function'){
      appMsg.innerText = 'ERROR: Zone ID salah atau AdBlock aktif';
      return;
    }

    appMsg.innerText = `Buka iklan ${p.ad_clicks_today + 1}/${maxClicks}...`;
    show_1234567890();

    setTimeout(async () => {
      const newPoints = p.points + 100;
      const newClicks = p.ad_clicks_today + 1;
      await supabase.from('profiles').update({ points: newPoints, ad_clicks_today: newClicks }).eq('id', userId);
      appMsg.innerText = `+100 Poin masuk! [${newClicks}/${maxClicks}] 🔥`;
      loadProfile();
    }, 1500);
  }

  document.getElementById('wdBtn').onclick = async () => {
    const { data: p } = await supabase.from('profiles').select('points').eq('id', userId).single();
    if(p.points < 10000) return showModal({title:'Gagal', text:'Minimal WD 10.000 Poin = 10rb Pulsa/DANA', callback:()=>{}});
    showModal({
      title: 'Withdraw Poin', text: 'WD 10.000 Poin ke: Pulsa/DANA', input: true,
      callback: async (method) => {
        if(!method || (method.toLowerCase()!== 'pulsa' && method.toLowerCase()!== 'dana')) return;
        showModal({
          title: 'Nomor Tujuan', text: `Masukkan No ${method}:`, input: true,
          callback: async (account) => {
            if(!account) return;
            await supabase.from('withdrawals').insert({ user_id: userId, amount: 10000, method, account });
            await supabase.from('profiles').update({ points: p.points - 10000 }).eq('id', userId);
            showModal({title:'Sukses', text:'WD 10.000 Poin diajukan. Tunggu 1x24 jam', callback:()=>{}});
            loadProfile();
          }
        });
      }
    });
  }

  document.getElementById('upgradeBtn').onclick = async () => {
    const { data: p } = await supabase.from('profiles').select('upgrade_status').eq('id', userId).single();
    if(p.upgrade_status === 'approved') return showModal({title:'Udah PREMIUM', text:'Akun kamu udah PREMIUM bos', callback:()=>{}});
    if(p.upgrade_status === 'pending') return showModal({title:'Tunggu Dulu', text:'Bukti transfer kamu lagi dicek admin', callback:()=>{}});
    showModal({
      title: 'Transfer ke BCA',
      text: `Transfer Rp10.000 ke:\n${REK_BCA}\n\nLalu upload bukti ke imgur.com dan paste linknya di bawah.`,
      input: true,
      callback: async (proofUrl) => {
        if(!proofUrl ||!proofUrl.startsWith('http')) return showModal({title:'Gagal', text:'Masukkan link foto valid dari imgur.com', callback:()=>{}});
        await supabase.from('profiles').update({ upgrade_status: 'pending', upgrade_proof_url: proofUrl }).eq('id', userId);
        showModal({title:'Sukses', text:'Bukti diterima. Tunggu admin approve 1x24 jam', callback:()=>{}});
        loadProfile();
      }
    });
  }
</script>
</body>
</html>
