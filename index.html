<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Supabase V10.5 PUBLIK</title>
<h1 style="color:lime">INI FILE V10.5 TEST PUBLIK</h1>
<script src="/js/supabase.js"></script> 
<style>
body{font-family:sans-serif;background:#111;color:#eee;margin:0;padding:20px}
.card{background:#222;padding:15px;border-radius:8px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border:1px solid #444;text-align:left;font-size:14px}
</style>
</head>
<body>

<h2>Test Koneksi Supabase Langsung</h2>

<div class="card">
  <h3>Data Video</h3>
  <div id="video-list">Loading video...</div>
</div>

<div class="card">
  <h3>Data Users</h3>
  <table><thead><tr><th>Email</th><th>Poin</th><th>Role</th></tr></thead><tbody id="users-tbody"><tr><td colspan="3">Loading...</td></tr></tbody></table>
</div>

<script>
// ==================== 1. KONFIG SUPABASE - GANTI PUNYA LU ====================
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== 2. LANGSUNG LOAD DATA, TANPA LOGIN ====================
document.addEventListener('DOMContentLoaded', () => { loadDataPublik(); });

async function loadDataPublik() {
    try {
        console.log('Mulai load data...');

        const { data: vids, error: vidsError } = await supabase.from('videos').select('*').order('id', { ascending: false });
        if (vidsError) throw vidsError; 
        renderVideos(vids || []);

        const { data: users, error: usersError } = await supabase.from('profiles').select('email, points, role').order('id', { ascending: false });
        if (usersError) throw usersError; 
        renderUsers(users || []);

        console.log('Sukses load semua data bos');

    } catch (error) { 
      alert('GAGAL LOAD DATA: ' + error.message); 
      console.error('ERROR DETAIL:', error); 
      document.getElementById('video-list').innerText = 'GAGAL: ' + error.message; 
    }
}

// ==================== 3. RENDER ====================
function renderVideos(data) {
    const list = document.getElementById('video-list');
    if (data.length === 0) return list.innerHTML = `<p>Belum ada video di DB.</p>`;
    list.innerHTML = data.map(v => `<div style="background:#000;padding:8px;margin-top:5px;border-radius:5px;"><b>${v.title}</b><br><small>${v.youtube_url}</small></div>`).join('');
}

function renderUsers(data) {
    const tbody = document.getElementById('users-tbody');
    if (data.length === 0) return tbody.innerHTML = `<tr><td colspan="3">Belum ada user</td></tr>`;
    tbody.innerHTML = data.map(u => `<tr><td>${u.email}</td><td>${u.points}</td><td>${u.role}</td></tr>`).join('');
}
</script>
</body>
</html>
