<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSA RAJA V11.3</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body{font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b);}
  .card{background: rgba(30,41,59,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);}
  .btn{transition: all .2s;}
  .btn:active{scale: 0.95;}
  .hidden{display: none;}
</style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- BOX LOGIN / DAFTAR -->
  <div id="authBox" class="card p-6 rounded-2xl shadow-2xl">
    <h1 class="text-3xl font-bold text-center mb-2">PULSA RAJA</h1>
    <p class="text-center text-slate-400 mb-6">Kerjain Misi, Dapet Saldo</p>
    
    <div class="space-y-3">
      <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded-lg bg-slate-800 border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 rounded-lg bg-slate-800 border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div class="grid grid-cols-2 gap-3 mt-4">
      <button id="loginBtn" class="btn w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-bold">Login</button>
      <button id="signupBtn" class="btn w-full bg-slate-600 hover:bg-slate-700 p-3 rounded-lg font-bold">Daftar</button>
    </div>
    <p id="refInfo" class="text-xs text-center text-green-400 mt-3"></p>
  </div>

  <!-- BOX APLIKASI UTAMA -->
  <div id="appBox" class="hidden space-y-4">
    
    <!-- HEADER PROFIL -->
    <div class="card p-4 rounded-2xl flex justify-between items-center">
      <div>
        <p class="text-slate-400 text-sm">Saldo Kamu</p>
        <p id="points" class="text-3xl font-bold text-yellow-400">0</p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-sm">Status</p>
        <p id="status" class="font-bold text-green-400">Free</p>
        <button id="adminBtn" class="hidden btn mt-2 text-xs bg-red-600 px-3 py-1 rounded-lg">ADMIN</button>
      </div>
    </div>

    <!-- MISI HARIAN -->
    <div class="card p-4 rounded-2xl space-y-3">
      <h2 class="font-bold text-lg">🎯 Misi Harian</h2>
      
      <button id="dailyBtn" class="btn w-full bg-yellow-500 hover:bg-yellow-600 p-3 rounded-lg font-bold flex justify-between items-center">
        <span>🎁 Daily Login</span> <span>+50</span>
      </button>

      <button id="ytBtn" class="btn w-full bg-red-500 hover:bg-red-600 p-3 rounded-lg font-bold flex justify-between items-center">
        <span>⚡ Tonton Iklan YT 15s</span> <span>+100</span>
      </button>
      <p id="ytCount" class="text-xs text-slate-400 text-center">Sisa: 5/5</p>

      <button id="subBtn" class="btn w-full bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-bold flex justify-between items-center">
        <span>🔔 Subscribe Chanel</span> <span>+200</span>
      </button>
    </div>

    <!-- UPGRADE -->
    <div class="card p-4 rounded-2xl space-y-3">
      <h2 class="font-bold text-lg">🚀 Upgrade Pro</h2>
      <input id="proofUrl" type="text" placeholder="Tempel Link Bukti TF" class="w-full p-3 rounded-lg bg-slate-800 border-slate-700">
      <button id="upgradeBtn" class="btn w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg font-bold">Kirim Bukti</button>
    </div>

    <!-- WD -->
    <div class="card p-4 rounded-2xl space-y-3">
      <h2 class="font-bold text-lg">💸 Withdraw</h2>
      <input id="wdAmount" type="number" placeholder="Jumlah Poin" class="w-full p-3 rounded-lg bg-slate-800 border-slate-700">
      <input id="wdAccount" type="text" placeholder="DANA/OVO/GOPAY No HP" class="w-full p-3 rounded-lg bg-slate-800 border-slate-700">
      <button id="wdBtn" class="btn w-full bg-pink-600 hover:bg-pink-700 p-3 rounded-lg font-bold">Ajukan WD</button>
    </div>

    <!-- REFERRAL -->
    <div class="card p-4 rounded-2xl space-y-3">
      <h2 class="font-bold text-lg">👑 Referral</h2>
      <p class="text-sm text-slate-400">Share link ini. Kamu +1000, Teman +1000</p>
      <input id="refLink" type="text" readonly class="w-full p-3 rounded-lg bg-slate-800 border-slate-700 text-xs">
      <button id="copyRef" class="btn w-full bg-slate-600 hover:bg-slate-700 p-3 rounded-lg font-bold">Copy Link</button>
    </div>
    
    <button id="logoutBtn" class="btn w-full bg-slate-700 p-3 rounded-lg font-bold">Logout</button>
  </div>

  <!-- BOX ADMIN -->
  <div id="adminBox" class="hidden space-y-4">
    <div class="card p-4 rounded-2xl">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-lg">🛡️ Panel Admin</h2>
        <button id="backBtn" class="btn text-sm bg-slate-600 px-3 py-1 rounded-lg">Kembali</button>
      </div>
      <div id="adminList" class="space-y-2 max-h-96 overflow-y-auto">Loading...</div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
const ADMIN_EMAIL = 'admin@gaskeun.com'; //  GANTI INI
const CHANNEL_LINK = 'https://youtube.com/@NAMA_CHANELMU'; //  GANTI INI
const YT_AD_LIMIT = 5;
const YT_AD_POINTS = 100;

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let userId = null;
let userProfile = null;

//  CEK ADA KODE REF DI URL GAK
const refCodeFromURL = new URLSearchParams(window.location.search).get('ref');
if(refCodeFromURL){
  document.getElementById('refInfo').textContent = `Kamu daftar pake kode ref: ${refCodeFromURL}`;
}

// AUTH
loginBtn.onclick = async () => {
  const { error } = await supabase.auth.signInWithPassword({ email: email.value, password: password.value });
  if(error) alert(error.message);
}
signupBtn.onclick = async () => {
  if(!email.value || !password.value) return alert('Email + Pass wajib');
  const { error } = await supabase.auth.signUp({ 
    email: email.value, 
    password: password.value,
    options: { data: { ref_code: refCodeFromURL } //  KIRIM REF KE DB
  });
  if(error) alert(error.message);
  else alert('Daftar sukses! Cek email buat verifikasi.');
}
logoutBtn.onclick = () => supabase.auth.signOut();

// STATE CHANGE
supabase.auth.onAuthStateChange(async (event, session) => {
  if(session && event === 'SIGNED_IN') {
    userId = session.user.id;
    //  AUTO FIX: BIKIN PROFIL KALO HANTU
    const { data: p } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if(!p){
      await supabase.from('profiles').insert({ id: userId, email: session.user.email, referral_code: Math.random().toString(36).substring(2, 9), points: 0 });
    }
    authBox.classList.add('hidden');
    appBox.classList.remove('hidden');
    if(session.user.email === ADMIN_EMAIL) adminBtn.classList.remove('hidden');
    loadProfile();
  } else if(event === 'SIGNED_OUT') {
    userId = null;
    appBox.classList.add('hidden');
    adminBox.classList.add('hidden');
    authBox.classList.remove('hidden');
  }
});

async function loadProfile(){
  const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
  userProfile = data;
  points.textContent = data.points.toLocaleString('id-ID');
  status.textContent = data.upgrade_status.toUpperCase();
  refLink.value = `${window.location.origin}?ref=${data.referral_code}`;
  
  // Update tombol misi
  const today = new Date().toISOString().slice(0,10);
  dailyBtn.disabled = data.last_login_date === today;
  dailyBtn.textContent = data.last_login_date === today ? '🎁 Daily Sudah Diambil' : '🎁 Daily Login +50';
  
  subBtn.disabled = data.last_sub_date === today;
  subBtn.textContent = data.last_sub_date === today ? '🔔 Sudah Sub Hari Ini' : '🔔 Subscribe Chanel +200';

  const adLeft = (data.last_ad_date === today) ? (YT_AD_LIMIT - data.ad_clicks_today) : YT_AD_LIMIT;
  ytCount.textContent = `Sisa: ${adLeft}/${YT_AD_LIMIT}`;
  ytBtn.disabled = adLeft <= 0;
  ytBtn.textContent = adLeft <= 0 ? '⚡ Limit Iklan Habis' : `⚡ Tonton Iklan YT 15s +${YT_AD_POINTS}`;
}

// MISI
dailyBtn.onclick = async () => {
  const today = new Date().toISOString().slice(0,10);
  const { error } = await supabase.from('profiles').update({ points: userProfile.points + 50, last_login_date: today }).eq('id', userId);
  if(!error) { alert('+50 Poin Daily Masuk!'); loadProfile(); }
}

ytBtn.onclick = () => {
  const today = new Date().toISOString().slice(0,10);
  const adLeft = (userProfile.last_ad_date === today) ? (YT_AD_LIMIT - userProfile.ad_clicks_today) : YT_AD_LIMIT;
  if(adLeft <= 0) return alert('Limit habis');

  // Buka YT di tab baru
  window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank'); //  GANTI LINK YT LU
  
  setTimeout(async () => {
    const newClicks = (userProfile.last_ad_date === today) ? userProfile.ad_clicks_today + 1 : 1;
    await supabase.from('profiles').update({ points: userProfile.points + YT_AD_POINTS, ad_clicks_today: newClicks, last_ad_date: today }).eq('id', userId);
    alert(`+${YT_AD_POINTS} Poin Masuk!`);
    loadProfile();
  }, 15000); // 15 detik
}

subBtn.onclick = async () => {
  window.open(CHANNEL_LINK, '_blank');
  const today = new Date().toISOString().slice(0,10);
  await supabase.from('profiles').update({ points: userProfile.points + 200, last_sub_date: today }).eq('id', userId);
  alert('+200 Poin Sub Masuk!');
  loadProfile();
}

upgradeBtn.onclick = async () => {
  if(!proofUrl.value) return alert('Isi link bukti dulu');
  await supabase.from('profiles').update({ upgrade_status: 'pending', upgrade_proof_url: proofUrl.value }).eq('id', userId);
  alert('Bukti terkirim. Tunggu admin approve.');
  loadProfile();
}

wdBtn.onclick = async () => {
  const amount = parseInt(wdAmount.value);
  if(!amount || amount > userProfile.points) return alert('Poin tidak cukup');
  if(!wdAccount.value) return alert('Isi nomor akun');
  await supabase.from('withdrawals').insert({ user_id: userId, amount, account: wdAccount.value });
  await supabase.from('profiles').update({ points: userProfile.points - amount }).eq('id', userId);
  alert('WD diajukan!');
  loadProfile();
}

copyRef.onclick = () => {
  navigator.clipboard.writeText(refLink.value);
  alert('Link Copied!');
}

// ADMIN
adminBtn.onclick = async () => {
  appBox.classList.add('hidden');
  adminBox.classList.remove('hidden');
  const { data } = await supabase.from('profiles').select('*').eq('upgrade_status', 'pending');
  adminList.innerHTML = data.map(u => `
    <div class="bg-slate-800 p-3 rounded-lg flex justify-between items-center">
      <div>
        <p class="font-bold text-sm">${u.email}</p>
        <a href="${u.upgrade_proof_url}" target="_blank" class="text-xs text-blue-400">Lihat Bukti</a>
      </div>
      <button onclick="approve('${u.id}')" class="btn bg-green-600 text-xs px-3 py-1 rounded-lg">Approve</button>
    </div>
  `).join('') || 'Tidak ada pengajuan';
}
backBtn.onclick = () => {
  adminBox.classList.add('hidden');
  appBox.classList.remove('hidden');
}
window.approve = async (id) => {
  await supabase.from('profiles').update({ upgrade_status: 'approved' }).eq('id', id);
  alert('Approved!');
  adminBtn.click(); // refresh
}
</script>
</body>
</html>
