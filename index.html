<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin V10.8 FIX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
h2,h3{margin-top:0} table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #334155;text-align:left;font-size:14px}
input,button{padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
button{cursor:pointer;background:#3b82f6;border:none} button:hover{opacity:0.8}
.btn-approve{background:#22c55e} .btn-tolak{background:#ef4444} .btn-hapus{background:#f97316}
.badge{padding:4px 8px;border-radius:6px;font-size:12px} .badge.pending{background:#f59e0b} .badge.paid{background:#22c55e} .badge.rejected{background:#ef4444}
.video-item{display:flex;justify-content:space-between;align-items:center;background:#0f172a;padding:10px;border-radius:8px;margin-top:8px}
#loading-text{text-align:center;padding:50px;font-size:18px}
.text-center{text-align:center}
</style>
</head>
<body>

<div id="loading-text">Loading data... Tunggu ya bos</div>

<div id="admin-content" style="display:none;">
  <h2>Panel Admin V10.8</h2>

  <div class="card">
    <h3>Upload Video YouTube</h3>
    <form id="form-upload-video" style="display:flex;gap:10px;">
      <input id="video-title" placeholder="Judul Video" required style="flex:1;">
      <input id="video-url" placeholder="Link Youtube" required style="flex:2;">
      <button type="submit">Upload</button>
    </form>
  </div>

  <div class="card">
    <h3>Data Withdraw</h3>
    <table><thead><tr><th>ID</th><th>Email</th><th>Jumlah</th><th>Rek</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="wd-tbody"></tbody></table>
  </div>

  <div class="card">
    <h3>Data Video</h3>
    <div id="video-list"></div>
  </div>

  <div class="card">
    <h3>Data Users</h3>
    <table><thead><tr><th>Email</th><th>Poin</th><th>Ref</th><th>Role</th><th>Upgrade</th></tr></thead><tbody id="users-tbody"></tbody></table>
  </div>
</div>

<script>
// ==================== KONFIG SUPABASE - GANTI INI BOS ====================
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== STATE GLOBAL ====================
let wdData = []; let videosData = []; let userData = [];

// ==================== MAIN ====================
document.addEventListener('DOMContentLoaded', () => { checkAdmin(); });

async function checkAdmin() {
    const { data: { user } = await supabase.auth.getUser();
    if (!user) return window.location.href = '/login.html';

    const { data: profile, error } = await supabase.from('profiles').select('role').eq('id', user.id).single();
    if (error || !profile || profile.role !== 'admin') {
        alert('Akses ditolak. Lu bukan Admin bos. Error: ' + (error?.message || 'Role bukan admin'));
        return window.location.href = '/dashboard.html';
    }
    await loadAdminData();
    document.getElementById('loading-text').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
}

async function loadAdminData() {
    try {
        const { data: wd, error: wdError } = await supabase.from('withdrawals').select('*, profiles(email)').order('created_at', { ascending: false });
        if (wdError) throw wdError; wdData = wd || []; renderWithdrawals(wdData);

        const { data: vids, error: vidsError } = await supabase.from('videos').select('*').order('id', { ascending: false });
        if (vidsError) throw vidsError; videosData = vids || []; renderVideos(videosData);

        const { data: users, error: usersError } = await supabase.from('profiles').select('*').order('points', { ascending: false });
        if (usersError) throw usersError; userData = users || []; renderUsers(userData);

    } catch (error) { 
      alert('GAGAL LOAD: ' + error.message); // <-- Ini biar langsung nongol errornya
      console.error('Gagal load:', error); 
      document.getElementById('loading-text').innerText = 'Gagal load: ' + error.message; 
    }
}

// ==================== RENDER ====================
function renderWithdrawals(data) {
    const tbody = document.getElementById('wd-tbody');
    if (data.length === 0) return tbody.innerHTML = `<tr><td colspan="6" class="text-center p-3">Belum ada data WD</td></tr>`;
    tbody.innerHTML = data.map(wd => `<tr><td>${wd.id}</td><td>${wd.profiles?.email || wd.user_id}</td><td>${wd.amount.toLocaleString('id-ID')}</td><td>${wd.e_wallet} - ${wd.e_wallet_number}</td><td><span class="badge ${wd.status}">${wd.status}</span></td><td>${wd.status === 'pending' ? `<button class="btn-approve" onclick="updateWD(${wd.id}, 'paid')">Approve</button> <button class="btn-tolak" onclick="updateWD(${wd.id}, 'rejected')">Tolak</button>` : '-'}</td></tr>`).join('');
}
function renderVideos(data) {
    const list = document.getElementById('video-list');
    if (data.length === 0) return list.innerHTML = `<p class="p-3">Belum ada video.</p>`;
    list.innerHTML = data.map(v => `<div class="video-item"><p><b>${v.title}</b><br><small>${v.youtube_url}</small></p><button class="btn-hapus" onclick="deleteVideo(${v.id})">Hapus</button></div>`).join('');
}
function renderUsers(data) {
    const tbody = document.getElementById('users-tbody');
    if (data.length === 0) return tbody.innerHTML = `<tr><td colspan="5">Belum ada user</td></tr>`;
    tbody.innerHTML = data.map(u => `<tr><td>${u.email}</td><td>${u.points.toLocaleString('id-ID')}</td><td>${u.referred_by ? 'Ada' : '-'}</td><td>${u.role}</td><td>${u.upgrade_status}</td></tr>`).join('');
}

// ==================== ACTIONS ====================
async function updateWD(id, status) {
    if(!confirm(`Yakin mau ${status} WD ini?`)) return;
    const { error } = await supabase.from('withdrawals').update({ status: status }).eq('id', id);
    if (error) return alert('Gagal: ' + error.message); alert(`WD ${status}`); loadAdminData(); 
}
async function deleteVideo(id) {
    if(!confirm('Hapus video ini?')) return;
    const { error } = await supabase.from('videos').delete().eq('id', id);
    if (error) return alert('Gagal: ' + error.message); loadAdminData();
}
document.getElementById('form-upload-video').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('video-title').value; const url = document.getElementById('video-url').value;
    if(!title || !url) return alert('Isi semua bos');
    const { error } = await supabase.from('videos').insert([{ title, youtube_url: url }]);
    if (error) return alert('Gagal upload: ' + error.message); alert('Video ke-upload'); e.target.reset(); loadAdminData();
});
</script>
</body>
</html>
