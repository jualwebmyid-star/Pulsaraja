<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>PulsaRaja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 max-w-md mx-auto">
  <div id="authBox" class="bg-slate-800 p-6 rounded-2xl">
    <h1 class="text-3xl font-bold text-yellow-400 text-center">PulsaRaja</h1>
    <input id="email" type="email" placeholder="Email" class="w-full bg-slate-700 p-3 rounded-lg mt-4">
    <input id="pass" type="password" placeholder="Password min 6" class="w-full bg-slate-700 p-3 rounded-lg mt-2">
    <button id="signupBtn" class="w-full bg-slate-600 font-bold py-3 rounded-lg mt-3">Daftar Gratis</button>
    <p id="authMsg" class="text-red-400 text-sm text-center mt-2"></p>
  </div>

<script>
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
  
  document.getElementById('signupBtn').onclick = async () => {
    document.getElementById('authMsg').innerText = 'Daftar...'; 
    const refCode = prompt('Kode referral? Kosongin aja');
    let referrerId = null;
    if(refCode && refCode.trim() !== ''){ // <-- Cuma jalan kalo ada isi
      const res = await supabase.from('profiles').select('id').eq('referral_code', refCode).single();
      if(res.data) referrerId = res.data.id;
    }
    const { error } = await supabase.auth.signUp({ // <-- INI KURUNGNYA UDAH BENER 3 BUAH
      email: document.getElementById('email').value, 
      password: document.getElementById('pass').value,
      options: { data: { referred_by: referrerId } }
    });
    document.getElementById('authMsg').innerText = error? 'ERROR: ' + error.message : 'Daftar berhasil! Coba login.';
  }
</script>
</body>
</html>
