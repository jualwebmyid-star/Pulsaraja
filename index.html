<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Test Supabase</title>
  <script src="./supabase.js"></script> 
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 max-w-md mx-auto">
  <div class="bg-slate-800 p-6 rounded-2xl">
    <h1 class="text-2xl font-bold text-yellow-400">Test Supabase</h1>
    <button id="tesBtn" class="w-full bg-green-600 font-bold py-3 rounded-lg mt-3">TES KONEK SUPABASE</button>
    <p id="msg" class="text-center mt-2 text-yellow-400"></p>
  </div>

<script>
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
  
  document.getElementById('tesBtn').onclick = async () => {
    document.getElementById('msg').innerText = 'Ngetes...';
    const { data, error } = await supabase.from('profiles').select('count').limit(1);
    if(error) {
      document.getElementById('msg').innerText = 'ERROR: ' + error.message;
    } else {
      document.getElementById('msg').innerText = 'SUKSES BOS! SUPABASE NYAMBUNG';
      alert('SUKSES BOS! SUPABASE NYAMBUNG');
    }
  }
</script>
</body>
</html>
