<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsar V10.7 PUBLIK ONLY</title>
<h1 style="color:#0f0;text-align:center">PULSAR V10.7 - NO ADMIN</h1>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
<style>
body{font-family:'Segoe UI',sans-serif;background:#111;color:#eee;margin:0;padding:20px}
.wrap{max-width:800px;margin:auto}
.card{background:#1c1c1c;padding:16px;border-radius:10px;margin-bottom:16px;border:1px solid #2a2a2a}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #2a2a2a;text-align:left;font-size:14px}
th{background:#222;color:#aaa}
.loading{color:#ff0}
.error{color:#f55;font-weight:bold}
a{color:#0af;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <h2>Status Koneksi: <span id="status" class="loading">Loading...</span></h2>
    <p><small>Buka F12 > Console buat liat error detail bos</small></p>
  </div>

  <div class="card">
    <h3>🎬 Daftar Video</h3>
    <div id="video-list" class="loading">Ambil data video...</div>
  </div>

  <div class="card">
    <h3>👥 Daftar User</h3>
    <table><thead><tr><th>Email</th><th>Poin</th><th>Role</th></tr></thead><tbody id="users-tbody"><tr><td colspan="3" class="loading">Ambil data user...</td></tr></tbody></table>
  </div>

</div>

<script>
// ==================== 1. GANTI INI PUNYA LU BOS ====================
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const statusEl = document.getElementById('status');

// ==================== 2. JALAN OTOMATIS PAS BUKA ====================
document.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
    try {
        console.log('1. Client Supabase OK');
        statusEl.innerText = 'Konek...';

        // Ambil Video
        const { data: vids, error: vidsError } = await supabase.from('videos').select('*').order('id', { ascending: false }).limit(20);
        if (vidsError) throw vidsError; 
        renderVideos(vids || []);

        // Ambil Users/Profiles 
        const { data: users, error: usersError } = await supabase.from('profiles').select('email, points, role').order('id', { ascending: false }).limit(20);
        if (usersError) throw usersError; 
        renderUsers(users || []);

        statusEl.innerText = 'Sukses ✅';
        statusEl.className = '';
        console.log('2. Data Sukses Diambil');

    } catch (error) { 
      console.error('ERROR DETAIL:', error); 
      statusEl.innerText = 'GAGAL ❌';
      statusEl.className = 'error';
      document.getElementById('video-list').innerHTML = `<p class="error">Gagal: ${error.message}</p>`; 
      document.getElementById('users-tbody').innerHTML = `<tr><td colspan="3" class="error">${error.message}</td></tr>`;
    }
}

// ==================== 3. CETAK KE HTML ====================
function renderVideos(data) {
    const list = document.getElementById('video-list');
    if (data.length === 0) return list.innerHTML = `<p style="color:#aaa">Tabel 'videos' kosong bos.</p>`;
    list.innerHTML = data.map(v => `
      <div style="background:#000;padding:12px;margin-top:8px;border-radius:8px;">
        <b>${v.title || 'Tanpa Judul'}</b><br>
        <small><a href="${v.youtube_url}" target="_blank">${v.youtube_url}</a></small>
      </div>`).join('');
}

function renderUsers(data) {
    const tbody = document.getElementById('users-tbody');
    if (data.length === 0) return tbody.innerHTML = `<tr><td colspan="3" style="color:#aaa">Tabel 'profiles' kosong.</td></tr>`;
    tbody.innerHTML = data.map(u => `<tr><td>${u.email || '-'}</td><td>${u.points ?? 0}</td><td>${u.role || '-'}</td></tr>`).join('');
}
</script>
</body>
</html>
