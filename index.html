<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulsaRaja Cuan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src='//libtl.com/sdk.js' data-zone='254061' data-sdk='show_254061'></script>
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4" } }
  </script>
  <style>.modal-bg { backdrop-filter: blur(4px); } </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans">

  <div class="p-4 max-w-md mx-auto">
    <!-- BOX LOGIN / DAFTAR -->
    <div id="authBox" class="bg-slate-800 p-6 rounded-2xl shadow-lg mt-10">
      <h1 class="text-3xl font-bold text-yellow-400 text-center mb-4">PulsaRaja 🔥</h1>
      <input id="email" type="email" placeholder="Email" class="w-full bg-slate-700 p-3 rounded-lg mb-2 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <input id="pass" type="password" placeholder="Password min 6" class="w-full bg-slate-700 p-3 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded-lg mb-2 transition">Login</button>
      <button id="signupBtn" class="w-full bg-slate-600 hover:bg-slate-700 font-bold py-3 rounded-lg transition">Daftar Gratis</button>
      <p id="authMsg" class="text-red-400 text-sm text-center mt-2 h-5"></p>
    </div>

    <!-- BOX APP SETELAH LOGIN -->
    <div id="appBox" class="hidden">
      <div class="bg-slate-800 p-6 rounded-2xl text-center mb-4 shadow-lg">
        <p class="text-slate-400">Poin Kamu</p>
        <p id="points" class="text-5xl font-bold text-yellow-400">0</p>
        <p id="status" class="text-sm text-slate-400 mt-1">Status: FREE</p>
      </div>

      <!-- TUGAS HARIAN -->
      <div class="bg-slate-800 p-4 rounded-2xl mb-4 shadow-lg">
        <p class="font-bold mb-2">Tugas Harian</p>
        <button id="checkinBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-2 rounded-lg transition">Check-in +50 Poin</button>
        <p id="checkinMsg" class="text-xs text-center mt-1 h-4 text-green-400"></p>
      </div>

      <!-- KODE REFERRAL + TOMBOL COPY -->
      <div class="bg-slate-800 p-4 rounded-2xl mb-4 shadow-lg">
        <p class="text-sm text-slate-400 mb-1">Kode Referral Kamu</p>
        <div class="flex gap-2">
          <input id="myRefCode" readonly class="w-full bg-slate-700 p-2 rounded-lg font-bold text-yellow-400 text-center">
          <button id="copyBtn" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold px-4 rounded-lg transition">Salin</button>
        </div>
        <p id="copyMsg" class="text-xs text-center mt-1 h-4 text-green-400"></p>
      </div>

      <!-- TOMBOL AKSI -->
      <button id="adBtn" class="w-full bg-green-600 hover:bg-green-700 font-bold py-4 rounded-xl mb-3 shadow-lg transition">Nonton Iklan +100 Poin</button>
      <button id="wdBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-xl mb-3 shadow-lg transition">Withdraw Poin</button>
      <button id="logoutBtn" class="w-full bg-red-600 hover:bg-red-700 font-bold py-2 rounded-lg text-sm transition">Logout</button>
      <p id="appMsg" class="text-center text-sm mt-3 text-yellow-400 h-5"></p>
    </div>
  </div>

  <!-- MODAL POPUP CANTIK -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 modal-bg flex items-center justify-center p-4 z-50">
    <div class="bg-slate-800 w-full max-w-sm rounded-2xl p-6 shadow-2xl">
      <p id="modalTitle" class="font-bold text-lg mb-2 text-yellow-400"></p>
      <p id="modalText" class="text-slate-300 mb-4"></p>
      <div id="modalInputBox" class="hidden mb-4">
        <input id="modalInput" type="text" class="w-full bg-slate-700 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>
      <div class="flex gap-2">
        <button id="modalCancel" class="w-full bg-slate-600 hover:bg-slate-700 font-bold py-2 rounded-lg transition">Batal</button>
        <button id="modalOk" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 rounded-lg transition">OK</button>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from '@supabase/supabase-js'
  const SUPABASE_URL = 'https://ikhyrkhsqrfispyvdtlk.supabase.co' 
  const SUPABASE_KEY = 'sb_publishable_z_1Ackgm_8GbmzUVJ5KRoQ_RMivj_CY' 
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
  
  let userId = null;
  const authMsg = document.getElementById('authMsg');
  const appMsg = document.getElementById('appMsg');

  // ===== SISTEM MODAL CANTIK =====
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const modalInputBox = document.getElementById('modalInputBox');
  const modalInput = document.getElementById('modalInput');
  const modalOk = document.getElementById('modalOk');
  const modalCancel = document.getElementById('modalCancel');
  let modalCallback = null;

  function showModal({title, text, input=false, callback}) {
    modalTitle.innerText = title;
    modalText.innerText = text;
    modalInputBox.classList.toggle('hidden',!input);
    modalInput.value = '';
    modal.classList.remove('hidden');
    modalCallback = callback;
  }
  function hideModal() {
    modal.classList.add('hidden');
    modalCallback = null;
  }
  modalOk.onclick = () => { if(modalCallback) modalCallback(modalInput.value); hideModal(); }
  modalCancel.onclick = hideModal;

  // ===== AUTH =====
  document.getElementById('signupBtn').onclick = async () => {
    authMsg.innerText = 'Daftar...';
    showModal({
      title: 'Kode Referral',
      text: 'Masukkan kode referral teman. Kosongkan jika tidak ada.',
      input: true,
      callback: async (refCode) => {
        let referrerId = null;
        if(refCode && refCode.trim()!== ''){
          const res = await supabase.from('profiles').select('id').eq('referral_code', refCode).single();
          if(res.data) referrerId = res.data.id; else {authMsg.innerText='Kode ref salah'; return;}
        }
        const { error } = await supabase.auth.signUp({
          email: document.getElementById('email').value,
          password: document.getElementById('pass').value,
          options: { data: { referred_by: referrerId } }
        });
        authMsg.innerText = error? 'ERROR: ' + error.message : 'Daftar berhasil! Cek email & login.';
      }
    });
  }

  document.getElementById('loginBtn').onclick = async () => {
    authMsg.innerText = 'Login...';
    const { error } = await supabase.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('pass').value
    });
    authMsg.innerText = error? 'ERROR: ' + error.message : '';
  }

  document.getElementById('logoutBtn').onclick = async () => await supabase.auth.signOut();

  supabase.auth.onAuthStateChange(async (_event, session) => {
    if(session) {
      userId = session.user.id;
      document.getElementById('authBox').classList.add('hidden');
      document.getElementById('appBox').classList.remove('hidden');
      loadProfile();
    } else {
      userId = null;
      document.getElementById('authBox').classList.remove('hidden');
      document.getElementById('appBox').classList.add('hidden');
    }
  });

  async function loadProfile() {
    const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if(error) { appMsg.innerText = 'Gagal load profil'; return; }
    document.getElementById('points').innerText = data.points.toLocaleString('id-ID');
    document.getElementById('status').innerText = `Status: ${data.is_premium? 'PREMIUM' : 'FREE'}`;
    document.getElementById('myRefCode').value = `https://pulsaraja.vercel.app?ref=${data.referral_code}`;
  }

  // ===== TOMBOL COPY REFERRAL =====
  document.getElementById('copyBtn').onclick = () => {
    const link = document.getElementById('myRefCode').value;
    navigator.clipboard.writeText(link);
    document.getElementById('copyMsg').innerText = 'Link berhasil disalin!';
    setTimeout(()=> document.getElementById('copyMsg').innerText='', 2000);
  }

  // ===== IKLAN +100 POIN =====
  document.getElementById('adBtn').onclick = () => {
    appMsg.innerText = 'Muat iklan...';
    if(typeof show_1234567!== 'function'){ // GANTI 1234567
      appMsg.innerText = 'ERROR: Zone ID salah';
      return;
    }
    show_1234567().then(async () => {
      const { data: p } = await supabase.from('profiles').select('points').eq('id', userId).single();
      await supabase.from('profiles').update({ points: p.points + 100 }).eq('id', userId);
      appMsg.innerText = 'Mantap! +100 Poin masuk 🔥';
      loadProfile();
    }).catch(() => { appMsg.innerText = 'Iklan kosong / di-skip'; });
  }

  // ===== CHECK-IN +50 POIN =====
  document.getElementById('checkinBtn').onclick = async () => {
    const today = new Date().toISOString().split('T')[0];
    const { data: p } = await supabase.from('profiles').select('last_checkin, points').eq('id', userId).single();
    if(p.last_checkin === today) return document.getElementById('checkinMsg').innerText = 'Udah check-in hari ini';
    await supabase.from('profiles').update({ points: p.points + 50, last_checkin: today }).eq('id', userId);
    document.getElementById('checkinMsg').innerText = '+50 Poin check-in masuk';
    loadProfile();
  }

  // ===== WD POIN PAKE MODAL =====
  document.getElementById('wdBtn').onclick = async () => {
    const { data: p } = await supabase.from('profiles').select('points').eq('id', userId).single();
    if(p.points < 10000) return showModal({title:'Gagal', text:'Minimal WD 10.000 Poin = 10rb Pulsa', callback:()=>{}});

    showModal({
      title: 'Withdraw Poin',
      text: 'WD 10.000 Poin ke: Pulsa/DANA',
      input: true,
      callback: async (method) => {
        if(!method || (method.toLowerCase()!== 'pulsa' && method.toLowerCase()!== 'dana')) return;
        showModal({
          title: 'Nomor Tujuan',
          text: `Masukkan No ${method}:`,
          input: true,
          callback: async (account) => {
            if(!account) return;
            await supabase.from('withdrawals').insert({ user_id: userId, amount: 10000, method, account });
            await supabase.from('profiles').update({ points: p.points - 10000 }).eq('id', userId);
            showModal({title:'Sukses', text:'WD 10.000 Poin diajukan. Tunggu 1x24 jam bos', callback:()=>{}});
            loadProfile();
          }
        });
      }
    });
  }

</script>
</body>
</html>
